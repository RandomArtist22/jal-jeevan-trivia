<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host Dashboard - Jal Jeevan Quiz</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="host-body">
  <!-- Animated Wave Background -->
  <div class="wave-container">
    <div class="wave wave1"></div>
    <div class="wave wave2"></div>
    <div class="wave wave3"></div>
  </div>

  <div class="container">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">💧</span>
        <h1>Jal Jeevan Quiz</h1>
      </div>
      <nav class="nav">
        <a href="/" class="nav-link">Home</a>
        <a href="/host" class="nav-link active">Host</a>
        <a href="/participant" class="nav-link">Participant</a>
      </nav>
    </header>

    <main class="host-dashboard">
      <!-- Connection Status -->
      <div class="status-bar">
        <div class="status-indicator" id="connectionStatus">
          <span class="status-dot"></span>
          <span class="status-text">Connecting...</span>
        </div>
        <div class="phase-badge" id="phaseBadge">
          <span class="phase-icon">🌊</span>
          <span class="phase-text">Lobby</span>
        </div>
      </div>

      <!-- Control Panel -->
      <section class="control-panel">
        <h2 class="panel-title">
          <span class="title-icon">🎮</span>
          Game Controls
        </h2>
        
        <div class="control-buttons">
          <button class="btn btn-primary control-btn" id="btnStartFastestFinger" disabled>
            <span class="btn-icon">⚡</span>
            <span>Start Fastest Finger First</span>
          </button>
          <button class="btn btn-accent control-btn" id="btnEndFastestFinger" disabled>
            <span class="btn-icon">⏹️</span>
            <span>End Fastest Finger</span>
          </button>
          <button class="btn btn-primary control-btn" id="btnStartQuiz" disabled>
            <span class="btn-icon">🚀</span>
            <span>Start Quiz</span>
          </button>
          <button class="btn btn-secondary control-btn" id="btnNextQuestion" disabled>
            <span class="btn-icon">⏭️</span>
            <span>Next Question</span>
          </button>
          <button class="btn btn-warning control-btn" id="btnUseLifeline" disabled>
            <span class="btn-icon">🎯</span>
            <span>Use 50:50 Lifeline</span>
          </button>
          <button class="btn btn-danger control-btn" id="btnEndQuiz" disabled>
            <span class="btn-icon">🏁</span>
            <span>End Quiz</span>
          </button>
          <button class="btn btn-outline control-btn" id="btnResetGame">
            <span class="btn-icon">🔄</span>
            <span>Reset Game</span>
          </button>
          <button class="btn btn-outline control-btn" id="btnViewScores">
            <span class="btn-icon">📊</span>
            <span>View Scores</span>
          </button>
        </div>
      </section>

      <!-- Timer Display -->
      <section class="timer-section">
        <div class="timer-circle" id="timerCircle">
          <svg class="timer-svg" viewBox="0 0 120 120">
            <circle class="timer-bg" cx="60" cy="60" r="54"></circle>
            <circle class="timer-progress" cx="60" cy="60" r="54" id="timerProgress"></circle>
          </svg>
          <div class="timer-text" id="timerText">--</div>
        </div>
      </section>

      <!-- Current Question Display -->
      <section class="question-display" id="questionDisplay" style="display: none;">
        <div class="question-header">
          <span class="question-number" id="questionNumber">Question 1</span>
          <span class="question-prize" id="questionPrize">₹1,000</span>
        </div>
        <h3 class="question-text" id="questionText">Loading question...</h3>
        <div class="options-grid" id="optionsGrid">
          <!-- Options will be populated dynamically -->
        </div>
      </section>

      <!-- Players List -->
      <section class="players-panel">
        <h2 class="panel-title">
          <span class="title-icon">👥</span>
          Registered Players
          <span class="player-count" id="playerCount">(0)</span>
        </h2>
        <div class="players-list" id="playersList">
          <div class="empty-state">
            <span class="empty-icon">👤</span>
            <p>Waiting for players to join...</p>
          </div>
        </div>
      </section>

      <!-- Fastest Finger Results -->
      <section class="results-panel" id="fastestFingerResults" style="display: none;">
        <h2 class="panel-title">
          <span class="title-icon">⚡</span>
          Fastest Finger Results
        </h2>
        <div class="results-list" id="ffResultsList">
          <!-- Results will be populated dynamically -->
        </div>
      </section>

      <!-- Final Scores -->
      <section class="results-panel" id="finalScores" style="display: none;">
        <h2 class="panel-title">
          <span class="title-icon">🏆</span>
          Final Leaderboard
        </h2>
        <div class="leaderboard" id="leaderboard">
          <!-- Leaderboard will be populated dynamically -->
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>🌊 Jal Jeevan KBC Quiz - Host Dashboard &copy; 2026</p>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/host.js"></script>
</body>
</html>
